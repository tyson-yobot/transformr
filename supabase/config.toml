[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "exp://localhost:8081"
additional_redirect_urls = ["transformr://", "exp://localhost:8081"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Email templates are configured in the Supabase Dashboard for production.
# Local template paths are commented out due to Windows CLI path resolution issue.
# [auth.email.template.confirmation]
# subject = "Verify your TRANSFORMR account"
# content_path = "./templates/confirmation.html"
#
# [auth.email.template.recovery]
# subject = "Reset your TRANSFORMR password"
# content_path = "./templates/reset-password.html"
#
# [auth.email.template.magic_link]
# subject = "Your TRANSFORMR sign-in link"
# content_path = "./templates/magic-link.html"
#
# [auth.email.template.invite]
# subject = "You've been invited to TRANSFORMR"
# content_path = "./templates/invite.html"

[auth.external.apple]
enabled = false
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_SECRET)"

[auth.external.google]
enabled = false
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

[edge_runtime]
enabled = true

[functions.stake-evaluator]
verify_jwt = true

[functions.ai-monthly-retrospective]
verify_jwt = false

[functions.ai-correlation]
verify_jwt = false
